<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | AI Trip Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {50: '#fdf2f8', 500: '#ec4899', 600: '#db2777', 700: '#be185d'}
                    },
                    boxShadow: { 'soft': '0 15px 35px rgba(0, 0, 0, 0.1)' }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .input-focus:focus { box-shadow: 0 0 0 4px rgba(236, 72, 153, 0.2); border-color: #ec4899; }
        .btn-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(236, 72, 153, 0.3); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-pink-50 via-rose-50 to-purple-100 px-4 py-12">

    <div class="bg-white p-8 sm:p-10 rounded-2xl shadow-soft w-full max-w-md border border-pink-100">

        <div class="text-center mb-8">
            <div class="mx-auto w-16 h-16 bg-gradient-to-r from-pink-500 to-purple-600 rounded-2xl flex items-center justify-center mb-5 shadow-lg">
                <i data-lucide="lock-keyhole" class="w-8 h-8 text-white"></i>
            </div>
            <h2 class="text-3xl font-bold text-gray-800">Forgot Password?</h2>
            <p class="text-gray-600 mt-2">No worries! We'll help you get back in.</p>
        </div>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="mb-6 p-4 rounded-lg border text-sm font-medium transition-all
                        {% if category == 'success' %}
                            bg-green-50 border-green-300 text-green-800
                        {% else %}
                            bg-red-50 border-red-300 text-red-800
                        {% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" class="space-y-6">

            <div>
                <label for="email" class="block text-sm font-semibold text-gray-700 mb-2">Email Address</label>
                <div class="relative">
                    <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 w-5 h-5"></i>
                    <input 
                        type="email" 
                        name="email" 
                        id="email" 
                        placeholder="you@example.com" 
                        required 
                        class="w-full pl-12 pr-4 py-4 bg-gray-50 border border-gray-200 rounded-xl text-gray-900 placeholder-gray-500 focus:outline-none input-focus transition-all duration-300 text-base"
                    >
                </div>
            </div>

            <button 
                type="submit"
                class="w-full bg-gradient-to-r from-pink-500 to-purple-600 text-white py-4 rounded-xl font-bold text-lg btn-hover transition-all duration-300 flex items-center justify-center space-x-3">
                <i data-lucide="send" class="w-6 h-6"></i>
                <span>Send Reset Link</span>
            </button>
        </form>

        <p class="mt-8 text-center text-gray-600">
            Remember your password? 
            <a href="{{ url_for('login') }}" class="font-bold text-pink-600 hover:text-pink-700 transition-colors">
                Back to Login
            </a>
        </p>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
