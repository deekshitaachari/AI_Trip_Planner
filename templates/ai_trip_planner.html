<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Trip Planner 🌴</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .hero { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 60px 0; }
        .form-container { max-width: 600px; margin: 0 auto; }
        .itinerary { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-top: 20px; }
        .day-header { color: #667eea; font-weight: bold; }
        pre { white-space: pre-wrap; background: #f8f9fa; padding: 15px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="hero text-center">
        <div class="container">
            <h1 class="display-4"><i class="fas fa-plane-departure"></i> AI Trip Planner</h1>
            <p class="lead">Plan your dream trip with personalized itineraries.</p>
        </div>
    </div>

    <div class="container my-5">
        <div class="form-container">
            <form method="POST">
                <div class="mb-3">
                    <label for="days" class="form-label">Travel Days (1-10)</label>
                    <input type="number" class="form-control" id="days" name="days" min="1" max="10" required>
                </div>
                <div class="mb-3">
                    <label for="destination" class="form-label">Destination</label>
                    <input type="text" class="form-control" id="destination" name="destination" placeholder="e.g., Paris, France" required>
                </div>
                <div class="mb-3">
                    <label for="style" class="form-label">Travel Style</label>
                    <select class="form-select" id="style" name="style" required>
                        <option value="Adventure">Adventure</option>
                        <option value="Relaxed">Relaxed</option>
                        <option value="Family">Family</option>
                        <option value="Luxury">Luxury</option>
                        <option value="Budget">Budget</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100"><i class="fas fa-magic"></i> Run</button>
            </form>

            {% if error %}
                <div class="alert alert-danger mt-3">{{ error }}</div>
            {% endif %}

            {% if itinerary %}
                <div class="itinerary">
                    <h3 class="text-center mb-4">Your Personalized Itinerary for {{ destination }} ({{ style }} Style, {{ days }} Days)</h3>
                    <p class="text-muted text-center">Generated on: {{ generated_at }}</p>
                    <div class="mb-3">
                        <button class="btn btn-outline-secondary" onclick="navigator.clipboard.writeText(itinerary.innerText)"><i class="fas fa-copy"></i> Copy Itinerary</button>
                    </div>
                    <div id="itinerary" class="pre-scrollable" style="max-height: 600px; overflow-y: auto;">
                        <pre>{{ itinerary }}</pre>
                    </div>
                </div>
            {% endif %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Optional: Add loading state
        document.querySelector('form').addEventListener('submit', function() {
            this.querySelector('button').innerHTML = '<i class="fas fa-spinner fa-spin"></i> Generating...';
            this.querySelector('button').disabled = true;
        });
    </script>
</body>
</html>
