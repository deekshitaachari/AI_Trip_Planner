<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | AI Trip Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { primary: {50:'#f0f9ff',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8'} }, boxShadow: { soft: '0 15px 30px rgba(0,0,0,0.08)' } } } }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .input-focus:focus { box-shadow: 0 0 0 4px rgba(59,130,246,0.2); border-color:#3b82f6; }
        .btn-hover:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(59,130,246,0.25); }
        .password-strength { height:4px; border-radius:2px; transition:all .3s ease; }
        .strength-weak   { background: linear-gradient(to right, #ef4444, #f87171); }
        .strength-fair   { background: linear-gradient(to right, #f59e0b, #fbbf24); }
        .strength-good   { background: linear-gradient(to right, #10b981, #34d399); }
        .strength-strong { background: linear-gradient(to right, #3b82f6, #60a5fa); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-primary-50 via-blue-50 to-indigo-100 px-4 py-12">

    <div class="bg-white p-8 sm:p-10 rounded-2xl shadow-soft w-full max-w-md border border-gray-100">

        <div class="text-center mb-8">
            <div class="mx-auto w-14 h-14 bg-gradient-to-r from-primary-500 to-primary-600 rounded-xl flex items-center justify-center mb-4 shadow-md">
                <i data-lucide="refresh-ccw" class="w-7 h-7 text-white"></i>
            </div>
            <h2 class="text-3xl font-extrabold text-gray-800">Set New Password</h2>
            <p class="text-gray-500 text-sm mt-1">Choose a strong, unique password.</p>
        </div>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="mb-6 p-4 rounded-lg text-sm font-medium {% if category == 'danger' %}bg-red-50 border border-red-300 text-red-700{% else %}bg-green-50 border border-green-300 text-green-700{% endif %}">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" class="space-y-6" id="resetForm">

            <!-- New Password -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">New Password</label>
                <div class="relative">
                    <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 w-5 h-5"></i>
                    <input type="password" name="password" id="password" required class="w-full pl-10 pr-12 py-3 border border-gray-200 rounded-lg focus:outline-none input-focus" placeholder="Enter new password">
                    <button type="button" id="togglePassword" class="absolute inset-y-0 right-4 flex items-center text-gray-500 hover:text-primary-600">
                        <i data-lucide="eye" class="w-5 h-5"></i>
                    </button>
                </div>

                <!-- Password Strength Meter (your full JS stays below) -->
                <div id="passwordStrength" class="mt-3 space-y-2 hidden">
                    <div class="flex justify-between items-center text-sm font-medium text-gray-600">
                        <span id="strengthText">Password Strength</span>
                        <div class="w-20">
                            <div class="password-strength h-1 bg-gray-200 rounded-full overflow-hidden">
                                <div id="progressFill" class="h-full w-0 transition-all duration-300"></div>
                            </div>
                        </div>
                    </div>
                    <div id="requirementsList" class="space-y-1 text-sm"></div>
                </div>
            </div>

            <!-- Confirm Password -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Confirm Password</label>
                <div class="relative">
                    <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 w-5 h-5"></i>
                    <input type="password" name="confirm_password" required class="w-full pl-10 py-3 border border-gray-200 rounded-lg focus:outline-none input-focus" placeholder="Confirm new password">
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-gradient-to-r from-primary-500 to-primary-600 text-white py-3 rounded-lg font-semibold text-lg btn-hover flex items-center justify-center" disabled>
                <span id="submitText"><i data-lucide="check-circle" class="inline w-5 h-5 mr-2"></i> Reset Password</span>
                <span id="loadingText" class="hidden"><i data-lucide="loader-2" class="w-5 h-5 mr-2 animate-spin"></i> Updating...</span>
            </button>
        </form>

        <p class="mt-6 text-center text-sm text-gray-600">
            Back to <a href="{{ url_for('login') }}" class="text-primary-600 hover:text-primary-700 font-semibold">Sign In</a>
        </p>
    </div>

    <!-- YOUR FULL JAVASCRIPT (unchanged – just copy-paste from your original) -->
    <script>
        lucide.createIcons();
        const passwordField = document.getElementById('password');
        const togglePassword = document.getElementById('togglePassword');
        const passwordStrength = document.getElementById('passwordStrength');
        const strengthText = document.getElementById('strengthText');
        const progressFill = document.getElementById('progressFill');
        const requirementsList = document.getElementById('requirementsList');
        const submitBtn = document.getElementById('submitBtn');
        const submitText = document.getElementById('submitText');
        const loadingText = document.getElementById('loadingText');

        const requirements = [
            { regex: /.{8,}/, text: "At least 8 characters" },
            { regex: /[A-Z]/, text: "1 uppercase letter (A-Z)" },
            { regex: /[0-9]/, text: "1 number (0-9)" },
            { regex: /[!@#$%^&*(),.?":{}|<>]/, text: "1 special character" }
        ];

        function updatePasswordStrength(pw) {
            const met = requirements.filter(r => r.regex.test(pw)).length;
            const strength = Math.min(met / requirements.length * 100, 100);
            progressFill.style.width = strength + '%';
            let cls = '', label = '';
            if (strength < 25) { cls='strength-weak'; label='Weak'; }
            else if (strength < 50) { cls='strength-fair'; label='Fair'; }
            else if (strength < 75) { cls='strength-good'; label='Good'; }
            else { cls='strength-strong'; label='Strong'; }
            progressFill.className = `h-full transition-all duration-300 ${cls}`;
            strengthText.textContent = `Password Strength: ${label}`;

            requirementsList.innerHTML = requirements.map(r => {
                const ok = r.regex.test(pw);
                return `<div class="flex items-center text-sm ${ok?'text-green-600':'text-red-600'}">
                    <i data-lucide="${ok?'check':'x'}" class="w-4 h-4 mr-1"></i> ${r.text}
                </div>`;
            }).join('');
            lucide.createIcons();
            passwordStrength.classList.toggle('hidden', pw.length === 0);
            submitBtn.disabled = met !== requirements.length;
        }

        togglePassword.addEventListener('click', () => {
            const type = passwordField.type === 'password' ? 'text' : 'password';
            passwordField.type = type;
            togglePassword.innerHTML = type === 'text' 
                ? '<i data-lucide="eye-off" class="w-5 h-5"></i>' 
                : '<i data-lucide="eye" class="w-5 h-5"></i>';
            lucide.createIcons();
        });

        passwordField.addEventListener('input', () => updatePasswordStrength(passwordField.value));

        document.getElementById('resetForm').addEventListener('submit', function() {
            submitText.classList.add('hidden');
            loadingText.classList.remove('hidden');
        });

        // Init
        updatePasswordStrength('');
    </script>
</body>
</html>
