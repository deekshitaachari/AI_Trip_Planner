<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | AI Trip Planner</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Animate.css (ADDED) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        body.auth-page {
            background: linear-gradient( #2E6467, #00221C);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Particle background (behind everything) */
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
            top: 0;
            left: 0;
        }

        .auth-container {
            background: #fff;
            padding: 30px 35px;
            border-radius: 12px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.15);
            max-width: 350px;
            width: 100%;
            text-align: center;

            /* Animate.css zoom-in */
            animation: fadeInSmooth 1s ease;
        }

        /* Smooth fade + slide */
        @keyframes fadeInSmooth {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .btn {
            background: linear-gradient(90deg, #2E6467, #00221C);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px;
            width: 100%;
            margin-top: 10px;
            transition: 0.2s ease-in-out;
        }

        .btn:hover {
            transform: translateY(-3px);
            opacity: 0.95;
        }

        a {
            color: #00221C;
            font-weight: 500;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>

</head>

<body class="auth-page">

    <!-- Particle Background -->
    <div id="particles-js"></div>

    <div class="auth-container animate__animated animate__fadeInUp">
        <h2 class="fw-bold">Welcome Back</h2>
        <p class="text-muted">Login to your account and start planning</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="alert alert-info">
                    {% for msg in messages %}
                        {{ msg }}
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="email" name="email" placeholder="Email" required class="form-control mb-3">
            <input type="password" name="password" placeholder="Password" required class="form-control mb-3">

            <a href="{{ url_for('forgot_password') }}" class="d-block mb-3">Forgot password?</a>

            <button type="submit" class="btn">Login</button>
        </form>

        <p class="mt-3">Don't have an account?
            <a href="{{ url_for('signup') }}">Sign up</a>
        </p>
    </div>

    <!-- Particles.js Script -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 70 },
                "color": { "value": "#ffffff" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.5, "random": true },
                "size": { "value": 3, "random": true },
                "line_linked": {
                    "enable": true,
                    "distance": 150,
                    "color": "#ffffff",
                    "opacity": 0.25,
                    "width": 1
                },
                "move": { "enable": true, "speed": 2 }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": {
                    "onhover": { "enable": true, "mode": "repulse" },
                    "onclick": { "enable": true, "mode": "push" }
                }
            },
            "retina_detect": true
        });
    </script>

</body>
</html>
