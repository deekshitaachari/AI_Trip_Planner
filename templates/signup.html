<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup | AI Trip Planner</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

    <!-- Animate.css (added) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <style>
        body.auth-page {
            background: linear-gradient( #2E6467, #00221C);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Particles background */
        #particles-js {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        .auth-container {
            background: #fff;
            padding: 30px 35px;
            border-radius: 12px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 360px;
            text-align: center;
            animation: fadeInSmooth 1s ease;
        }

        /* Smooth fade & slide animation */
        @keyframes fadeInSmooth {
            from { opacity: 0; transform: translateY(20px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .auth-container h2 {
            font-weight: 600;
            font-size: 1.5rem;
            color: #333;
        }

        .auth-container p {
            color: #666;
            margin-bottom: 20px;
            font-size: 0.95rem;
        }

        .form-control {
            padding: 10px 12px;
            border-radius: 8px;
            border: 1.5px solid #ddd;
            font-size: 0.95rem;
            transition: 0.3s ease;
        }

        .form-control:focus {
            border-color: #6e0e91ff;
            box-shadow: 0 0 8px rgba(110,14,145,0.25);
        }

        .btn-primary-custom {
            display: block;
            width: 100%;
            background: linear-gradient(90deg, #2E6467, #00221C);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 12px 0;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s ease-in-out;
        }

        .btn-primary-custom:hover {
            transform: translateY(-3px);
            opacity: 0.95;
            box-shadow: 0 8px 18px rgba(110,14,145,0.3);
        }

        a {
            color: #00221C;
            font-weight: 500;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }

        .alert {
            padding: 10px;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 15px;
        }
    </style>
</head>

<body class="auth-page">

    <!-- Particle Background -->
    <div id="particles-js"></div>

    <div class="auth-container animate__animated animate__fadeInUp">
        <h2>Join the AI Adventure</h2>
        <p>Create your account and plan your next journey</p>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }} alert-dismissible fade show">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('signup') }}">
            <div class="mb-3">
                <input type="text" name="name" class="form-control" placeholder="Full Name" required>
            </div>
            <div class="mb-3">
                <input type="email" name="email" class="form-control" placeholder="Email Address" required>
            </div>
            <div class="mb-3">
                <input type="password" name="password" class="form-control" placeholder="Create Password" required minlength="6">
            </div>
            <div class="mb-3">
                <input type="password" name="confirm_password" class="form-control" placeholder="Confirm Password" required>
            </div>

            <button type="submit" class="btn-primary-custom">Sign Up</button>
        </form>

        <p class="mt-4 text-muted">
            Already have an account?
            <a href="{{ url_for('login') }}">Login</a>
        </p>
    </div>

    <!-- Particles Script -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 70 },
                "color": { "value": "#ffffff" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.5, "random": true },
                "size": { "value": 3, "random": true },
                "line_linked": {
                    "enable": true,
                    "distance": 150,
                    "color": "#ffffff",
                    "opacity": 0.25,
                    "width": 1
                },
                "move": { "enable": true, "speed": 2 }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": {
                    "onhover": { "enable": true, "mode": "repulse" },
                    "onclick": { "enable": true, "mode": "push" }
                }
            },
            "retina_detect": true
        });
    </script>

</body>
</html>
